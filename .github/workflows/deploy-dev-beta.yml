name: Deploy to Development & Beta

on:
  push:
    branches:
      - develop           # Auto-deploy to dev-index
      - 'beta/**'         # Auto-deploy to beta-index (e.g. beta/ctt-task#-feature)
      - beta              # Auto-deploy to beta-index (legacy branch)
      - staging           # Auto-deploy to beta-index (legacy branch)
      
  workflow_dispatch:  # Manual trigger
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - development
          - beta

jobs:
  determine-environment:
    name: Determine Target Environment
    runs-on: self-hosted
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      target_host: ${{ steps.set-env.outputs.target_host }}
      
    steps:
      - name: Set environment based on branch or input
        id: set-env
        run: |
          REF_NAME="${{ github.ref_name }}"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENV="${{ inputs.environment }}"
          elif [[ "$REF_NAME" == "develop" ]]; then
            ENV="development"
          elif [[ "$REF_NAME" == "staging" ]] || [[ "$REF_NAME" == "beta" ]] || [[ "$REF_NAME" == beta/* ]]; then
            ENV="beta"
          else
            echo "Unknown branch: ${{ github.ref }}"
            exit 1
          fi
          
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          
          if [[ "$ENV" == "development" ]]; then
            echo "target_host=dev-index.operations.access-ci.org" >> $GITHUB_OUTPUT
          elif [[ "$ENV" == "beta" ]]; then
            echo "target_host=beta-index.operations.access-ci.org" >> $GITHUB_OUTPUT
          fi

  deploy:
    name: Deploy to ${{ needs.determine-environment.outputs.environment }}
    needs: determine-environment
    runs-on: [self-hosted, linux, deployment, serviceindex]
    environment: 
      name: ${{ needs.determine-environment.outputs.environment }}
      url: https://${{ needs.determine-environment.outputs.target_host }}
    
    steps:
      - name: Checkout Django Application
        uses: actions/checkout@v4
        with:
          repository: access-ci-org/Operations_ServiceIndex_Django
          ref: ${{ github.ref }}
          path: django-app

      - name: Checkout Infrastructure Repository  
        uses: actions/checkout@v4
        with:
          repository: access-ci-org/Operations_ServiceIndex_Infrastructure
          path: infrastructure
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get commit info
        id: commit
        working-directory: django-app
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "branch=$(git rev-parse --abbrev-ref HEAD)" >> $GITHUB_OUTPUT
          echo "message=$(git log -1 --pretty=%B)" >> $GITHUB_OUTPUT

      - name: Update infrastructure repo on runner
        working-directory: infrastructure
        run: |
          git pull origin main

      - name: Determine deployment tag
        id: deployment-tag
        working-directory: django-app
        run: |
          # For dev/beta, we can deploy from branch HEAD
          # Create a timestamp-based pseudo-tag for tracking
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          BRANCH="${{ steps.commit.outputs.branch }}"
          TAG="${BRANCH}-${TIMESTAMP}-${{ steps.commit.outputs.sha }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Deploying version: $TAG"

      - name: Pre-deployment checks
        working-directory: infrastructure/ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'False'
        run: |
          # Verify Ansible can reach the host
          # Uses /home/accessops-aws-root.pem via hosts file configuration
          ansible \
            -i hosts \
            ${{ needs.determine-environment.outputs.target_host }} \
            -m ping

      - name: Run Ansible deployment
        working-directory: infrastructure/ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'False'
          ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
        run: |
          # For dev/beta deployments, we deploy from the current branch
          # Ansible will clone the repo at the specified commit
          
          ansible-playbook \
            -i hosts \
            application_playbook.yml \
            --limit=${{ needs.determine-environment.outputs.target_host }} \
            -e "app_tag=${{ github.ref_name }}" \
            -e "git_version=${{ steps.commit.outputs.sha }}" \
            -vv \
            || { echo "❌ Deployment failed"; exit 1; }

      - name: Verify deployment
        run: |
          # Wait for service to be ready
          sleep 10
          
          # Check if the service is responding
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -k https://${{ needs.determine-environment.outputs.target_host }} \
            --max-time 30 || echo "000")
          
          if [[ "$HTTP_CODE" =~ ^(200|301|302)$ ]]; then
            echo "✅ Service is responding (HTTP $HTTP_CODE)"
          else
            echo "⚠️  Service returned HTTP $HTTP_CODE"
            echo "This might be expected if authentication is required"
          fi

      - name: Deployment summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ needs.determine-environment.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Target Host**: ${{ needs.determine-environment.outputs.target_host }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ steps.commit.outputs.branch }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ steps.commit.outputs.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployment Tag**: ${{ steps.deployment-tag.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Commit Message" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.commit.outputs.message }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  notify-on-failure:
    name: Notify on Failure
    needs: [determine-environment, deploy]
    runs-on: ubuntu-latest
    if: failure()
    
    steps:
      - name: Send failure notification
        run: |
          echo "❌ Deployment to ${{ needs.determine-environment.outputs.environment }} failed"
          echo "Check the workflow logs for details"
          
